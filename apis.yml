  description: Jane's documented HTTP API (published as a Swagger UI at
    api.iheartjane.com/jane-api-docs) for retrieving live store menu products and
    for generating the access tokens used to authenticate downstream calls. Used to
    surface a dispensary's real-time menu, brands, categories, and pricing from the
    Jane Universal Product Catalog. Access is partner-gated - credentials are issued
    by a Jane account representative - so the operations below are modeled from
    Jane's public documentation, not confirmed against an open endpoint.
- aid: iheartjane:iheartjane-digital-merchandising-sdk
  name: Jane Digital Merchandising SDK (Jane DM SDK)
  tags:
  - Personalization
  - Merchandising
  - Advertising
  - Widgets
  - SDK
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://dm-sdk-docs.iheartjane.com/docs/api/
  baseURL: https://dm-sdk-docs.iheartjane.com
  endpointsModeled: true
  properties:
  - url: https://dm-sdk-docs.iheartjane.com/docs/api/
    type: APIReference
  - url: https://dm-sdk-docs.iheartjane.com/docs/app/intro/
    type: Documentation
  description: The Jane DM SDK is a TypeScript/JavaScript library (usable in
    client-side React/Angular/Vue and server-side Node.js/Express apps) that
    embeds MyHigh-powered personalization and publisher monetization widgets into a
    retailer's own menu - a Recommended Row of personalized products, a
    Recommended Sort for search ranking, a single-brand Top of Menu sponsored row,
    and a Cart Topper of sponsored and organic recommendations. The SDK requires
    approval from Jane to enable on a menu; initialization identifiers, package
    name, and endpoints are provisioned by a Jane account representative.
