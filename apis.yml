name: Jane (iHeartJane)
kind: company
description: Jane Technologies (iHeartJane) is a cannabis ecommerce and marketplace
  platform that powers real-time online menus, point-of-sale and kiosk checkout,
  order and reservation flows, and the Jane Universal Product Catalog for 2,500+
  dispensaries and brands across the United States and Canada. Jane exposes a
  documented HTTP API (the Jane API, published as Swagger at
  api.iheartjane.com/jane-api-docs) for retrieving live store menu products and
  generating access tokens, and a partner Digital Merchandising SDK (Jane DM SDK)
  for embedding MyHigh-powered personalization and sponsored-product widgets into a
  retailer's own menu. Both surfaces are partner-gated - access requires approval
  and credentials from a Jane account representative - so the endpoints listed here
  are modeled from Jane's public documentation rather than exercised against a
  live, open, unauthenticated API.
